片，加入豆瓣酱、甜面酱和花椒炒出红油。`,`放入青红椒翻炒断生，再加入青蒜苗翻匀。`,`加生抽和白糖调味，大火快速翻炒后出锅。`],tips:[`肉片要放凉再切，更容易切薄。`,`豆瓣酱和甜面酱都有咸味，一般不用额外加盐。`]},{id:`qing-jiao-rou-si`,name:`青椒肉丝`,type:`meat`,tags:[`川菜`,`快手`,`微辣`,`家常`],cookingTime:25,difficulty:`简单`,servings:2,imageType:`meat`,ingredients:[L(`里脊肉`,220,`g`,`meat`),L(`青椒`,3,`个`,`vegetable`),L(`大蒜`,3,`瓣`,`vegetable`),L(`生姜`,1,`小块`,`vegetable`)],seasonings:[L(`生抽`,1.5,`勺`,`seasoning`),L(`料酒`,1,`勺`,`seasoning`),L(`淀粉`,1,`勺`,`seasoning`),L(`蚝油`,1,`勺`,`seasoning`),L(`盐`,2,`g`,`seasoning`),L(`食用油`,2,`勺`,`seasoning`)],steps:[`里脊肉顺纹切细丝，加入料酒、生抽、淀粉和少许油抓匀腌10分钟。`,`青椒去籽切丝，姜蒜切末。`,`热锅热油，下肉丝快速滑散，肉丝变色后盛出。`,`锅中留底油，放姜蒜炒香，倒入青椒丝大火翻炒。`,`青椒断生后倒回肉丝，加蚝油和少许盐调味。`,`快速翻炒均匀，保持青椒脆感后出锅。`],tips:[`肉丝腌制时加少许油可以减少粘连。`,`青椒不要炒太久，颜色和口感都会更好。`]},{id:`gong-bao-ji-ding`,name:`宫保鸡丁`,type:`meat`,tags:[`川菜`,`酸甜微辣`,`下饭`],cookingTime:30,difficulty:`中等`,servings:2,imageType:`spicy`,ingredients:[L(`鸡腿肉`,260,`g`,`meat`),L(`黄瓜`,.5,`根`,`vegetable`),L(`胡萝卜`,.5,`根`,`vegetable`),L(`花生米`,50,`g`,`other`),L(`大葱`,1,`根`,`vegetable`),L(`干辣椒`,6,`个`,`seasoning`)],seasonings:[L(`生抽`,2,`勺`,`seasoning`),L(`香醋`,1.5,`勺`,`seasoning`),L(`白糖`,1,`勺`,`seasoning`),L(`料酒`,1,`勺`,`seasoning`),L(`淀粉`,1.5,`勺`,`seasoning`),L(`花椒`,12,`粒`,`seasoning`),L(`盐`,1,`g`,`seasoning`)],steps:[`鸡腿肉切丁，用料酒、生抽和半勺淀粉抓匀腌10分钟。`,`黄瓜、胡萝卜切丁，大葱切段，干辣椒剪段。`,`用生抽、香醋、白糖、盐、淀粉和少许清水调成碗汁。`,`热锅下油，放鸡丁炒至变色后盛出。`,`锅中放花椒、干辣椒和葱段炒香，加入胡萝卜丁翻炒。`,`倒回鸡丁和黄瓜丁，淋入碗汁炒到包裹均匀。`,`最后撒入花生米，快速翻匀即可。`],tips:[`碗汁提前调好，炒制时更从容。`,`花生米最后放，保持酥脆。`]},{id:`yu-xiang-rou-si`,name:`鱼香肉丝`,type:`meat`,tags:[`川菜`,`鱼香味`,`中辣`,`下饭`],cookingTime:35,difficulty:`中等`,servings:2,imageType:`spicy`,ingredients:[L(`里脊肉`,220,`g`,`meat`),L(`木耳`,60,`g`,`vegetable`),L(`胡萝卜`,.5,`根`,`vegetable`),L(`青椒`,1,`个`,`vegetable`),L(`泡椒`,4,`个`,`seasoning`),L(`大蒜`,3,`瓣`,`vegetable`),L(`生姜`,1,`小块`,`vegetable`)],seasonings:[L(`生抽`,2,`勺`,`seasoning`),L(`香醋`,2,`勺`,`seasoning`),L(`白糖`,1.5,`勺`,`seasoning`),L(`淀粉`,1.5,`勺`,`seasoning`),L(`料酒`,1,`勺`,`seasoning`),L(`豆瓣酱`,1,`勺`,`seasoning`)],steps:[`里脊肉切丝，加料酒、生抽和淀粉抓匀腌10分钟。`,`木耳泡发切丝，胡萝卜和青椒切丝，泡椒、姜蒜剁碎。`,`用生抽、香醋、白糖、淀粉和少许水调成鱼香汁。`,`热油滑炒肉丝至变色，盛出备用。`,`锅中放泡椒、姜蒜和豆瓣酱炒出香味。`,`加入配菜丝炒软，再倒回肉丝翻匀。`,`淋入鱼香汁，大火收至汤汁浓亮即可。`],tips:[`泡椒是鱼香味的关键，不建议省略。`,`最后大火收汁，菜色更亮。`]},{id:`suan-tai-la-rou`,name:`蒜苔炒腊肉`,type:`meat`,tags:[`川菜`,`烟火味`,`下饭`],cookingTime:25,difficulty:`简单`,servings:2,imageType:`meat`,ingredients:[L(`腊肉`,180,`g`,`meat`),L(`蒜苔`,260,`g`,`vegetable`),L(`红椒`,1,`个`,`vegetable`),L(`大蒜`,2,`瓣`,`vegetable`)],seasonings:[L(`生抽`,1,`勺`,`seasoning`),L(`料酒`,1,`勺`,`seasoning`),L(`白糖`,.5,`勺`,`seasoning`),L(`食用油`,1,`勺`,`seasoning`)],steps:[`腊肉温水洗净，上锅蒸8分钟后切薄片。`,`蒜苔切段，红椒切丝，大蒜切片。`,`锅中少油，下腊肉小火煸出油脂。`,`加入蒜片和红椒炒香，再放蒜苔大火翻炒。`,`淋入料酒、生抽和白糖，翻炒到蒜苔断生。`,`尝咸淡后出锅，腊肉咸时不用加盐。`],tips:[`腊肉先蒸再炒更香也不硬。`,`蒜苔保持微脆最好吃。`]},{id:`gan-guo-wu-hua-rou-tu-dou-pian`,name:`干锅五花肉土豆片`,type:`meat`,tags:[`川菜`,`家常菜`,`微辣`,`下饭`],cookingTime:35,difficulty:`中等`,servings:2,imageType:`spicy`,ingredients:[L(`五花肉`,250,`g`,`meat`),L(`土豆`,2,`个`,`vegetable`),L(`洋葱`,`半`,`个`,`vegetable`),L(`青椒`,1,`个`,`vegetable`),L(`红椒`,1,`个`,`vegetable`),L(`蒜`,4,`瓣`,`vegetable`),L(`干辣椒`,`适量`,``,`seasoning`),L(`小葱`,2,`根`,`vegetable`)],seasonings:[L(`生抽`,2,`勺`,`seasoning`),L(`老抽`,.5,`勺`,`seasoning`),L(`蚝油`,1,`勺`,`seasoning`),L(`料酒`,1,`勺`,`seasoning`),L(`豆瓣酱`,1,`勺`,`seasoning`),L(`白糖`,`少许`,``,`seasoning`),L(`盐`,`适量`,``,`seasoning`),L(`白芝麻`,`少许`,``,`seasoning`)],steps:[`土豆去皮切薄片，清水浸泡去淀粉后沥干。`,`五花肉切薄片，洋葱、青红椒切块，蒜切片，小葱切段。`,`平底锅少油，下土豆片煎至两面金黄，盛出备用。`,`锅中下五花肉，小火煸出油脂。`,`放入蒜片、干辣椒、豆瓣酱炒香。`,`倒入洋葱、青红椒和土豆片翻炒。`,`加生抽、老抽、蚝油、白糖和少许盐调味。`,`出锅前撒白芝麻和葱段。`],tips:[`土豆片不要切太厚，否则不容易熟。`,`五花肉要煸出油脂，成菜更香。`,`豆瓣酱有咸味，盐要少放。`]},{id:`shui-zhu-rou-pian`,name:`水煮肉片`,type:`meat`,tags:[`川菜`,`中辣`,`经典`,`下饭`],cookingTime:40,difficulty:`稍难`,servings:2,imageType:`spicy`,ingredients:[L(`里脊肉`,260,`g`,`meat`),L(`豆芽`,200,`g`,`vegetable`),L(`莴笋尖`,120,`g`,`vegetable`),L(`蒜`,4,`瓣`,`vegetable`),L(`姜`,1,`小块`,`vegetable`),L(`小葱`,2,`根`,`vegetable`)],seasonings:[L(`豆瓣酱`,1.5,`勺`,`seasoning`),L(`火锅底料`,30,`g`,`seasoning`),L(`干辣椒`,8,`个`,`seasoning`),L(`花椒`,1,`勺`,`seasoning`),L(`生抽`,1,`勺`,`seasoning`),L(`料酒`,1,`勺`,`seasoning`),L(`淀粉`,1.5,`勺`,`seasoning`)],steps:[`里脊肉切薄片，加料酒、生抽和淀粉抓匀腌15分钟。`,`豆芽和莴笋尖焯熟，铺在大碗底部。`,`锅中热油，放豆瓣酱、火锅底料、姜蒜炒出红油。`,`加入适量清水煮开，转小火一片片下肉片。`,`肉片变白后连汤倒入铺好蔬菜的碗中。`,`表面撒干辣椒、花椒和葱花，淋热油激香。`],tips:[`肉片要薄，煮到变色即可。`,`不吃太辣时减少火锅底料和干辣椒。`]},{id:`jian-jiao-ji`,name:`尖椒鸡`,type:`meat`,tags:[`川菜`,`中辣`,`下饭`,`香辣`],cookingTime:35,difficulty:`中等`,servings:2,imageType:`spicy`,ingredients:[L(`鸡腿肉`,300,`g`,`meat`),L(`二荆条`,180,`g`,`vegetable`),L(`小米辣`,3,`根`,`vegetable`),L(`蒜`,4,`瓣`,`vegetable`),L(`姜`,1,`小块`,`vegetable`)],seasonings:[L(`料酒`,1,`勺`,`seasoning`),L(`生抽`,1.5,`勺`,`seasoning`),L(`老抽`,.5,`勺`,`seasoning`),L(`花椒`,1,`勺`,`seasoning`),L(`白胡椒粉`,1,`g`,`seasoning`),L(`盐`,2,`g`,`seasoning`)],steps:[`鸡腿肉去骨切小丁，用料酒、生抽和白胡椒粉腌10分钟。`,`二荆条和小米辣切圈，姜蒜切末。`,`热锅宽油，下鸡丁煸炒到边缘微焦。`,`加入姜蒜和花椒炒香，再加入辣椒圈。`,`调入老抽上色，按口味加少许盐。`,`大火翻炒到辣椒香味充分出来即可。`],tips:[`鸡腿肉比鸡胸肉更嫩。`,`辣椒量可以按家里口味调整。`]},{id:`la-zi-ji-ding`,name:`辣子鸡丁`,type:`meat`,tags:[`川菜`,`中辣`,`香酥`],cookingTime:40,difficulty:`中等`,servings:2,imageType:`spicy`,ingredients:[L(`鸡腿肉`,350,`g`,`meat`),L(`干辣椒`,18,`个`,`seasoning`),L(`花椒`,1,`勺`,`seasoning`),L(`蒜`,4,`瓣`,`vegetable`),L(`姜`,1,`小块`,`vegetable`),L(`白芝麻`,1,`勺`,`seasoning`)],seasonings:[L(`料酒`,1,`勺`,`seasoning`),L(`生抽`,1,`勺`,`seasoning`),L(`盐`,2,`g`,`seasoning`),L(`白胡椒粉`,1,`g`,`seasoning`),L(`淀粉`,1,`勺`,`seasoning`),L(`食用油`,300,`ml`,`seasoning`)],steps:[`鸡腿肉切丁，加料酒、生抽、盐、胡椒粉和淀粉抓匀腌15分钟。`,`干辣椒剪段，姜蒜切片。`,`锅中热油，下鸡丁炸至金黄后捞出。`,`油温升高后复炸30秒，鸡丁更酥。`,`锅中留少油，下姜蒜、花椒和干辣椒小火炒香。`,`倒入鸡丁和白芝麻翻匀，补少许盐后出锅。`],tips:[`炒辣椒时火不要大，避免发苦。`,`复炸能让口感更干香。`]},{id:`tu-dou-shao-pai-gu`,name:`土豆烧排骨`,type:`meat`,tags:[`家常`,`咸香`,`下饭`],cookingTime:55,difficulty:`中等`,servings:2,imageType:`meat`,ingredients:[L(`排骨`,450,`g`,`meat`),L(`土豆`,2,`个`,`vegetable`),L(`胡萝卜`,.5,`根`,`vegetable`),L(`姜`,1,`小块`,`vegetable`),L(`葱`,2,`根`,`vegetable`)],seasonings:[L(`生抽`,2,`勺`,`seasoning`),L(`老抽`,.5,`勺`,`seasoning`),L(`料酒`,1,`勺`,`seasoning`),L(`冰糖`,8,`g`,`seasoning`),L(`八角`,1,`个`,`seasoning`),L(`豆瓣酱`,.5,`勺`,`seasoning`)],steps:[`排骨冷水下锅，加料酒和姜片焯水，洗净浮沫。`,`土豆、胡萝卜切滚刀块，葱切段。`,`锅中少油炒冰糖，放排骨翻炒上色。`,`加入豆瓣酱、姜片、八角、生抽和老抽炒香。`,`加热水没过排骨，小火炖30分钟。`,`加入土豆和胡萝卜，再炖15分钟至软糯。`,`大火收汁，撒葱段即可。`],tips:[`加热水能让排骨更软。`,`土豆后放，避免炖散。`]},{id:`fan-qie-niu-nan`,name:`番茄牛腩`,type:`meat`,tags:[`家常`,`酸甜`,`暖胃`],cookingTime:70,difficulty:`中等`,servings:2,imageType:`meat`,ingredients:[L(`牛腩`,450,`g`,`meat`),L(`番茄`,3,`个`,`vegetable`),L(`洋葱`,.5,`个`,`vegetable`),L(`姜`,1,`小块`,`vegetable`),L(`葱`,2,`根`,`vegetable`)],seasonings:[L(`番茄酱`,2,`勺`,`seasoning`),L(`生抽`,1.5,`勺`,`seasoning`),L(`料酒`,1,`勺`,`seasoning`),L(`盐`,3,`g`,`seasoning`),L(`冰糖`,8,`g`,`seasoning`),L(`香叶`,1,`片`,`seasoning`)],steps:[`牛腩切块，冷水下锅加料酒焯水，洗净备用。`,`番茄去皮切块，洋葱切块，姜葱备好。`,`锅中少油炒洋葱和姜，加入一半番茄炒出汁。`,`放牛腩翻炒，加入番茄酱、生抽和冰糖。`,`加热水、香叶，小火炖50分钟。`,`加入剩余番茄再炖10分钟，调盐收浓汤汁。`],tips:[`番茄分两次放，汤底浓又有番茄块口感。`,`牛腩可提前炖好，晚饭时更省时。`]},{id:`pao-jiao-niu-rou-si`,name:`泡椒牛肉丝`,type:`meat`,tags:[`川菜`,`泡椒`,`中辣`,`快手`],cookingTime:25,difficulty:`中等`,servings:2,imageType:`spicy`,ingredients:[L(`牛里脊`,220,`g`,`meat`),L(`泡椒`,6,`个`,`seasoning`),L(`芹菜`,120,`g`,`vegetable`),L(`姜`,1,`小块`,`vegetable`),L(`蒜`,3,`瓣`,`vegetable`)],seasonings:[L(`生抽`,1,`勺`,`seasoning`),L(`料酒`,1,`勺`,`seasoning`),L(`淀粉`,1,`勺`,`seasoning`),L(`白胡椒粉`,1,`g`,`seasoning`),L(`白糖`,.5,`勺`,`seasoning`),L(`盐`,1,`g`,`seasoning`)],steps:[`牛肉逆纹切丝，加料酒、生抽、淀粉和胡椒粉腌10分钟。`,`泡椒切碎，芹菜切段，姜蒜切末。`,`热锅宽油，下牛肉丝快速滑散变色后盛出。`,`锅中留油，放姜蒜和泡椒炒出酸辣香味。`,`加入芹菜段翻炒断生，倒回牛肉丝。`,`加白糖和少许盐调味，快速翻匀出锅。`],tips:[`牛肉要逆纹切，口感更嫩。`,`泡椒有咸酸味，盐最后再判断。`]},{id:`lian-bai-chao-rou`,name:`莲白炒肉`,type:`meat`,tags:[`家常`,`快手`,`微辣`],cookingTime:22,difficulty:`简单`,servings:2,imageType:`meat`,ingredients:[L(`前腿肉`,180,`g`,`meat`),L(`莲白`,350,`g`,`vegetable`),L(`干辣椒`,4,`个`,`seasoning`),L(`蒜`,3,`瓣`,`vegetable`)],seasonings:[L(`生抽`,1.5,`勺`,`seasoning`),L(`料酒`,1,`勺`,`seasoning`),L(`盐`,2,`g`,`seasoning`),L(`白糖`,.5,`勺`,`seasoning`),L(`香醋`,.5,`勺`,`seasoning`)],steps:[`猪肉切薄片，莲白手撕成片并沥干水。`,`蒜切片，干辣椒剪段。`,`锅中热油，下肉片煸炒出香味。`,`加入蒜片和干辣椒炒香。`,`倒入莲白大火翻炒到略软。`,`加生抽、盐、白糖和锅边香醋，炒匀出锅。`],tips:[`莲白手撕比刀切更容易入味。`,`大火快炒能减少出水。`]},{id:`rou-mo-qie-zi`,name:`肉末茄子`,type:`meat`,tags:[`家常`,`下饭`,`微辣`],cookingTime:35,difficulty:`中等`,servings:2,imageType:`spicy`,ingredients:[L(`猪肉末`,160,`g`,`meat`),L(`长茄子`,2,`根`,`vegetable`),L(`蒜`,4,`瓣`,`vegetable`),L(`姜`,1,`小块`,`vegetable`),L(`小葱`,2,`根`,`vegetable`)],seasonings:[L(`豆瓣酱`,1,`勺`,`seasoning`),L(`生抽`,1.5,`勺`,`seasoning`),L(`老抽`,.5,`勺`,`seasoning`),L(`蚝油`,1,`勺`,`seasoning`),L(`白糖`,.5,`勺`,`seasoning`),L(`淀粉`,1,`勺`,`seasoning`)],steps:[`茄子切条，用少许盐抓匀静置8分钟后挤出水分。`,`姜蒜切末，小葱切葱花。`,`锅中适量油，下茄子煎软后盛出。`,`锅中留油，下肉末炒散，加入豆瓣酱、姜蒜炒香。`,`倒回茄子，加生抽、老抽、蚝油和白糖翻匀。`,`淋入水淀粉收汁，撒葱花出锅。`],tips:[`茄子先盐腌能少吸油。`,`收汁不要太干，拌饭更香。`]},{id:`zi-jiang-ya`,name:`仔姜鸭`,type:`meat`,tags:[`川菜`,`中辣`,`仔姜香`],cookingTime:50,difficulty:`中等`,servings:2,imageType:`spicy`,ingredients:[L(`鸭腿肉`,450,`g`,`meat`),L(`仔姜`,120,`g`,`vegetable`),L(`二荆条`,120,`g`,`vegetable`),L(`泡椒`,5,`个`,`seasoning`),L(`蒜`,4,`瓣`,`vegetable`)],seasonings:[L(`豆瓣酱`,1,`勺`,`seasoning`),L(`料酒`,1,`勺`,`seasoning`),L(`生抽`,1.5,`勺`,`seasoning`),L(`老抽`,.5,`勺`,`seasoning`),L(`白糖`,.5,`勺`,`seasoning`),L(`盐`,2,`g`,`seasoning`)],steps:[`鸭腿肉剁小块，冷水下锅焯水后沥干。`,`仔姜切片，二荆条切段，泡椒和蒜切碎。`,`锅中热油，下鸭肉煸炒到表面收紧并出油。`,`加入豆瓣酱、泡椒和蒜炒出香味。`,`加料酒、生抽、老抽、白糖和少量热水焖20分钟。`,`放入仔姜和二荆条翻炒，收汁后加盐调味。`],tips:[`鸭肉要煸干水汽，成菜才香。`,`仔姜后放，保留清香和脆感。`]},{id:`dou-hua-niu-rou`,name:`豆花牛肉`,type:`meat`,tags:[`川菜`,`麻辣`,`嫩滑`],cookingTime:35,difficulty:`中等`,servings:2,imageType:`spicy`,ingredients:[L(`牛里脊`,220,`g`,`meat`),L(`嫩豆腐`,1,`盒`,`tofu`),L(`豆芽`,150,`g`,`vegetable`),L(`蒜`,4,`瓣`,`vegetable`),L(`小葱`,2,`根`,`vegetable`)],seasonings:[L(`豆瓣酱`,1,`勺`,`seasoning`),L(`火锅底料`,20,`g`,`seasoning`),L(`生抽`,1,`勺`,`seasoning`),L(`料酒`,1,`勺`,`seasoning`),L(`淀粉`,1,`勺`,`seasoning`),L(`花椒粉`,1,`g`,`seasoning`)],steps:[`牛肉切薄片，用料酒、生抽和淀粉腌10分钟。`,`嫩豆腐切大块，豆芽焯熟铺碗底。`,`锅中炒香豆瓣酱、火锅底料和蒜末。`,`加入清水煮开，放豆腐小火煮3分钟入味。`,`下牛肉片煮至变色，连汤倒入碗中。`,`撒葱花和花椒粉，可淋少许热油增香。`],tips:[`豆腐轻轻推动，避免碎。`,`牛肉片不要久煮。`]},{id:`qing-jiao-hui-guo-ji`,name:`青椒回锅鸡`,type:`meat`,tags:[`川菜`,`家常`,`微辣`],cookingTime:32,difficulty:`中等`,servings:2,imageType:`meat`,ingredients:[L(`鸡腿肉`,320,`g`,`meat`),L(`青椒`,3,`个`,`vegetable`),L(`洋葱`,.5,`个`,`vegetable`),L(`蒜`,3,`瓣`,`vegetable`),L(`姜`,1,`小块`,`vegetable`)],seasonings:[L(`豆瓣酱`,1,`勺`,`seasoning`),L(`生抽`,1.5,`勺`,`seasoning`),L(`料酒`,1,`勺`,`seasoning`),L(`老抽`,.5,`勺`,`seasoning`),L(`白糖`,.5,`勺`,`seasoning`)],steps:[`鸡腿肉切块，加料酒焯水后沥干。`,`青椒和洋葱切块，姜蒜切片。`,`锅中热油，下鸡块煸炒到表面微黄。`,`加入豆瓣酱、姜蒜炒香并炒出红油。`,`倒入青椒和洋葱翻炒，加入生抽、老抽和白糖。`,`炒到青椒断生即可出锅。`],tips:[`鸡肉煸到微焦更像回锅风味。`,`青椒最后放，保留香气。`]},{id:`suan-xiang-pai-gu`,name:`蒜香排骨`,type:`meat`,tags:[`家常`,`蒜香`,`香酥`],cookingTime:45,difficulty:`中等`,servings:2,imageType:`meat`,ingredients:[L(`肋排`,450,`g`,`meat`),L(`大蒜`,8,`瓣`,`vegetable`),L(`小葱`,2,`根`,`vegetable`),L(`生姜`,1,`小块`,`vegetable`)],seasonings:[L(`料酒`,1,`勺`,`seasoning`),L(`生抽`,2,`勺`,`seasoning`),L(`蚝油`,1,`勺`,`seasoning`),L(`盐`,2,`g`,`seasoning`),L(`白胡椒粉`,1,`g`,`seasoning`),L(`淀粉`,2,`勺`,`seasoning`)],steps:[`排骨洗净泡出血水，沥干后用厨房纸吸干。`,`蒜剁成蒜末，姜切末，小葱切花。`,`排骨加入蒜末、姜末、料酒、生抽、蚝油、盐、胡椒粉和淀粉腌20分钟。`,`锅中热油，下排骨中火煎到表面金黄。`,`转小火加盖焖8分钟，确保排骨熟透。`,`开盖把水汽炒干，撒葱花出锅。`],tips:[`排骨尽量选小块肋排，熟得快。`,`蒜末容易糊，煎时火不要太大。`]},{id:`suan-cai-yu-pian`,name:`酸菜鱼片`,type:`meat`,tags:[`川菜`,`酸辣`,`鱼片`],cookingTime:40,difficulty:`中等`,servings:2,imageType:`spicy`,ingredients:[L(`黑鱼片`,350,`g`,`meat`),L(`酸菜`,180,`g`,`vegetable`),L(`豆芽`,150,`g`,`vegetable`),L(`泡椒`,4,`个`,`seasoning`),L(`姜`,1,`小块`,`vegetable`),L(`蒜`,4,`瓣`,`vegetable`)],seasonings:[L(`料酒`,1,`勺`,`seasoning`),L(`白胡椒粉`,1,`g`,`seasoning`),L(`淀粉`,1.5,`勺`,`seasoning`),L(`盐`,2,`g`,`seasoning`),L(`白醋`,1,`勺`,`seasoning`),L(`干辣椒`,5,`个`,`seasoning`)],steps:[`鱼片用料酒、胡椒粉、盐和淀粉抓匀腌10分钟。`,`酸菜切段，泡椒、姜蒜切碎，豆芽焯熟铺碗底。`,`锅中热油，炒香姜蒜、泡椒和酸菜。`,`加入热水煮5分钟，调入少许盐和白醋。`,`转小火下鱼片，煮到鱼片变白卷起。`,`连汤倒入碗中，放干辣椒后淋少许热油。`],tips:[`鱼片下锅后少搅动，避免碎。`,`酸菜先炒再煮，香味更足。`]},{id:`ji-mi-ya-cai`,name:`鸡米芽菜`,type:`meat`,tags:[`川菜`,`下饭`,`快手`,`微辣`],cookingTime:25,difficulty:`简单`,servings:2,imageType:`spicy`,ingredients:[L(`鸡胸肉`,250,`g`,`meat`),L(`宜宾芽菜`,80,`g`,`vegetable`),L(`小米辣`,2,`根`,`vegetable`),L(`青椒`,1,`根`,`vegetable`),L(`大蒜`,3,`瓣`,`vegetable`),L(`生姜`,1,`小块`,`vegetable`),L(`小葱`,2,`根`,`vegetable`)],seasonings:[L(`料酒`,1,`勺`,`seasoning`),L(`生抽`,1,`勺`,`seasoning`),L(`老抽`,.5,`勺`,`seasoning`),L(`蚝油`,1,`勺`,`seasoning`),L(`白糖`,.5,`勺`,`seasoning`),L(`盐`,`少许`,``,`seasoning`),L(`食用油`,`适量`,``,`seasoning`),L(`白胡椒粉`,`少许`,``,`seasoning`),L(`淀粉`,1,`勺`,`seasoning`)],steps:[`鸡胸肉切成约0.8cm小丁，加入料酒、生抽、淀粉和白胡椒粉抓匀腌制10分钟。`,`芽菜清水冲洗后挤干水分，小米辣和青椒切圈，蒜姜切末，小葱切葱花。`,`热锅凉油，下鸡丁快速滑炒至变色，盛出备用。`,`锅中留底油，放入姜蒜、小米辣炒香。`,`加入芽菜翻炒2-3分钟，炒出香味。`,`倒入鸡丁，加入生抽、老抽、蚝油、白糖翻炒均匀。`,`加入青椒圈，根据口味少许盐调味。`,`出锅前撒葱花即可。`],tips:[`芽菜本身有盐味，最后盐要少放。`,`鸡丁提前腌制可以更嫩。`,`这道菜很下饭，适合配清淡素菜和汤。`]},{id:`qing-chao-you-mai-cai`,name:`清炒油麦菜`,type:`vegetable`,tags:[`清淡`,`快手`,`素菜`],cookingTime:12,difficulty:`简单`,servings:2,imageType:`vegetable`,ingredients:[L(`油麦菜`,350,`g`,`vegetable`),L(`蒜`,3,`瓣`,`vegetable`)],seasonings:[L(`盐`,2,`g`,`seasoning`),L(`食用油`,1,`勺`,`seasoning`),L(`鸡精`,1,`g`,`seasoning`)],steps:[`油麦菜洗净沥干，切成合适长段。`,`蒜切末备用。`,`锅烧热后下油，放蒜末炒香。`,`倒入油麦菜大火快速翻炒。`,`菜叶变软后加盐和少许鸡精。`,`翻匀立即出锅，避免出水过多。`],tips:[`青菜洗后要尽量沥干。`,`全程大火快炒口感更清爽。`]},{id:`suan-rong-sheng-cai`,name:`蒜蓉生菜`,type:`vegetable`,tags:[`清淡`,`快手`,`蒜香`],cookingTime:12,difficulty:`简单`,servings:2,imageType:`vegetable`,ingredients:[L(`生菜`,350,`g`,`vegetable`),L(`蒜`,4,`瓣`,`vegetable`)],seasonings:[L(`蚝油`,1,`勺`,`seasoning`),L(`生抽`,.5,`勺`,`seasoning`),L(`盐`,1,`g`,`seasoning`),L(`食用油`,1,`勺`,`seasoning`)],steps:[`生菜掰开洗净沥水，蒜剁成蒜蓉。`,`锅中烧水，滴几滴油，快速焯生菜10秒。`,`生菜捞出摆盘。`,`锅中少油炒香蒜蓉。`,`加入蚝油、生抽和少许清水煮开。`,`把蒜蓉汁淋在生菜上即可。`],tips:[`焯水时间要短，保持翠绿。`,`蚝油有咸味，盐只需少许。`]},{id:`qiang-chao-bai-cai`,name:`炝炒白菜`,type:`vegetable`,tags:[`家常`,`快手`,`微辣`],cookingTime:15,difficulty:`简单`,servings:2,imageType:`vegetable`,ingredients:[L(`大白菜`,400,`g`,`vegetable`),L(`干辣椒`,4,`个`,`seasoning`),L(`蒜`,3,`瓣`,`vegetable`)],seasonings:[L(`盐`,2,`g`,`seasoning`),L(`香醋`,1,`勺`,`seasoning`),L(`白糖`,.5,`勺`,`seasoning`),L(`食用油`,1,`勺`,`seasoning`)],steps:[`白菜帮和叶分开切片，蒜切片，干辣椒剪段。`,`热锅下油，放蒜片和干辣椒小火炒香。`,`先放白菜帮大火翻炒1分钟。`,`再放白菜叶继续翻炒到变软。`,`加入盐、白糖和香醋调味。`,`大火翻匀后出锅。`],tips:[`白菜帮先炒，熟度更均匀。`,`香醋沿锅边淋，香气更足。`]},{id:`fan-qie-chao-dan`,name:`番茄炒蛋`,type:`vegetable`,tags:[`家常`,`快手`,`不辣`],cookingTime:15,difficulty:`简单`,servings:2,imageType:`light`,ingredients:[L(`番茄`,2,`个`,`vegetable`),L(`鸡蛋`,3,`个`,`egg`),L(`小葱`,1,`根`,`vegetable`)],seasonings:[L(`盐`,2,`g`,`seasoning`),L(`白糖`,.5,`勺`,`seasoning`),L(`食用油`,2,`勺`,`seasoning`)],steps:[`番茄切块，鸡蛋加少许盐打散，小葱切花。`,`热锅多一点油，倒入鸡蛋液炒成大块盛出。`,`锅中留油，放番茄块翻炒出汁。`,`加入白糖和少许盐，让番茄味更柔和。`,`倒回鸡蛋块，轻轻翻炒吸收汤汁。`,`撒葱花出锅。`],tips:[`鸡蛋先炒嫩一些，回锅后刚好。`,`番茄酸时加一点糖更平衡。`]},{id:`ma-po-dou-fu`,name:`麻婆豆腐`,type:`vegetable`,tags:[`川菜`,`麻辣`,`下饭`],cookingTime:25,difficulty:`中等`,servings:2,imageType:`spicy`,ingredients:[L(`嫩豆腐`,1,`盒`,`tofu`),L(`牛肉末`,80,`g`,`meat`),L(`蒜苗`,1,`根`,`vegetable`),L(`姜蒜`,`适量`,``,`vegetable`)],seasonings:[L(`豆瓣酱`,1,`勺`,`seasoning`),L(`豆豉`,1,`勺`,`seasoning`),L(`生抽`,1,`勺`,`seasoning`),L(`花椒粉`,1,`g`,`seasoning`),L(`淀粉`,1,`勺`,`seasoning`)],steps:[`豆腐切块，用淡盐水焯一下去豆腥并定型。`,`姜蒜切末，蒜苗切小段。`,`锅中下油，炒香牛肉末至酥香。`,`加入豆瓣酱、豆豉和姜蒜炒出红油。`,`加适量水和生抽，放豆腐小火煮5分钟。`,`分两次淋水淀粉勾芡，撒花椒粉和蒜苗出锅。`],tips:[`豆腐不要大力翻炒，用锅铲轻推。`,`勾芡分次加，汤汁更包裹。`]},{id:`jia-chang-dou-fu`,name:`家常豆腐`,type:`vegetable`,tags:[`川菜`,`家常`,`微辣`],cookingTime:28,difficulty:`中等`,servings:2,imageType:`vegetable`,ingredients:[L(`老豆腐`,350,`g`,`tofu`),L(`木耳`,50,`g`,`vegetable`),L(`青椒`,1,`个`,`vegetable`),L(`胡萝卜`,.5,`根`,`vegetable`)],seasonings:[L(`豆瓣酱`,1,`勺`,`seasoning`),L(`生抽`,1.5,`勺`,`seasoning`),L(`蚝油`,1,`勺`,`seasoning`),L(`白糖`,.5,`勺`,`seasoning`),L(`淀粉`,1,`勺`,`seasoning`)],steps:[`老豆腐切三角片，木耳泡发，青椒和胡萝卜切片。`,`平底锅少油，把豆腐煎到两面金黄。`,`锅中留底油，炒香豆瓣酱。`,`加入木耳和胡萝卜翻炒。`,`倒入豆腐、青椒、生抽、蚝油和白糖。`,`加少量水焖2分钟，水淀粉收汁即可。`],tips:[`豆腐煎到表面定型后更耐炒。`,`青椒最后放，颜色更好看。`]},{id:`gan-bian-si-ji-dou`,name:`干煸四季豆`,type:`vegetable`,tags:[`川菜`,`干香`,`微辣`],cookingTime:30,difficulty:`中等`,servings:2,imageType:`spicy`,ingredients:[L(`四季豆`,350,`g`,`vegetable`),L(`猪肉末`,80,`g`,`meat`),L(`芽菜`,30,`g`,`vegetable`),L(`干辣椒`,5,`个`,`seasoning`),L(`蒜`,3,`瓣`,`vegetable`)],seasonings:[L(`生抽`,1,`勺`,`seasoning`),L(`盐`,1,`g`,`seasoning`),L(`白糖`,.5,`勺`,`seasoning`),L(`食用油`,3,`勺`,`seasoning`)],steps:[`四季豆摘筋掰段，洗净后彻底沥干。`,`锅中稍多油，下四季豆煸到表皮起皱后盛出。`,`锅中留油，下肉末炒散炒香。`,`加入蒜末、干辣椒和芽菜炒香。`,`倒回四季豆，加生抽、盐和白糖。`,`翻炒均匀，四季豆完全熟透后出锅。`],tips:[`四季豆必须炒熟。`,`沥干水再煸，油不会乱溅。`]},{id:`qing-jiao-tu-dou-si`,name:`青椒土豆丝`,type:`vegetable`,tags:[`家常`,`快手`,`清爽`],cookingTime:18,difficulty:`简单`,servings:2,imageType:`vegetable`,ingredients:[L(`土豆`,2,`个`,`vegetable`),L(`青椒`,1,`个`,`vegetable`),L(`蒜`,2,`瓣`,`vegetable`)],seasonings:[L(`盐`,2,`g`,`seasoning`),L(`生抽`,.5,`勺`,`seasoning`),L(`香醋`,.5,`勺`,`seasoning`),L(`食用油`,1,`勺`,`seasoning`)],steps:[`土豆切丝，用清水冲洗去淀粉后沥干。`,`青椒切丝，蒜切片。`,`热锅下油，放蒜片炒香。`,`倒入土豆丝大火翻炒。`,`土豆丝变透明后加入青椒丝。`,`加盐、生抽和少许香醋，炒匀出锅。`],tips:[`土豆丝泡水后口感更脆。`,`喜欢软一点可多炒1分钟。`]},{id:`suan-la-tu-dou-si`,name:`酸辣土豆丝`,type:`vegetable`,tags:[`川菜`,`酸辣`,`快手`],cookingTime:18,difficulty:`简单`,servings:2,imageType:`spicy`,ingredients:[L(`土豆`,2,`个`,`vegetable`),L(`干辣椒`,4,`个`,`seasoning`),L(`蒜`,3,`瓣`,`vegetable`),L(`小葱`,1,`根`,`vegetable`)],seasonings:[L(`香醋`,1.5,`勺`,`seasoning`),L(`盐`,2,`g`,`seasoning`),L(`白糖`,.5,`勺`,`seasoning`),L(`花椒`,8,`粒`,`seasoning`)],steps:[`土豆切细丝，反复冲洗后泡水5分钟。`,`干辣椒剪段，蒜切片，小葱切段。`,`热锅下油，放花椒、干辣椒和蒜片炒香。`,`倒入沥干的土豆丝大火翻炒。`,`加入盐、白糖和香醋调味。`,`土豆丝断生后撒葱段出锅。`],tips:[`醋分两次放会更香：先少量炝锅，后面补酸味。`,`不要炒太久，保持脆爽。`]},{id:`qiang-chao-lian-bai`,name:`炝炒莲白`,type:`vegetable`,tags:[`川菜`,`微辣`,`快手`],cookingTime:15,difficulty:`简单`,servings:2,imageType:`vegetable`,ingredients:[L(`莲白`,400,`g`,`vegetable`),L(`干辣椒`,5,`个`,`seasoning`),L(`蒜`,3,`瓣`,`vegetable`)],seasonings:[L(`盐`,2,`g`,`seasoning`),L(`香醋`,1,`勺`,`seasoning`),L(`白糖`,.5,`勺`,`seasoning`),L(`食用油`,1,`勺`,`seasoning`)],steps:[`莲白手撕成片，洗净沥干。`,`蒜切片，干辣椒剪段。`,`锅烧热下油，先炒香蒜片和干辣椒。`,`倒入莲白大火快速翻炒。`,`莲白略塌后加盐、白糖和香醋。`,`翻炒均匀，保持脆感出锅。`],tips:[`莲白一定要沥干，炒出来才香。`,`出锅前再加醋，酸香更明显。`]},{id:`bai-you-dong-gua`,name:`白油冬瓜`,type:`vegetable`,tags:[`清淡`,`家常`,`不辣`],cookingTime:22,difficulty:`简单`,servings:2,imageType:`light`,ingredients:[L(`冬瓜`,450,`g`,`vegetable`),L(`蒜`,2,`瓣`,`vegetable`),L(`小葱`,1,`根`,`vegetable`)],seasonings:[L(`盐`,2,`g`,`seasoning`),L(`鸡精`,1,`g`,`seasoning`),L(`水淀粉`,2,`勺`,`seasoning`),L(`食用油`,1,`勺`,`seasoning`)],steps:[`冬瓜去皮去瓤，切成厚片。`,`蒜切末，小葱切葱花。`,`锅中少油炒香蒜末。`,`倒入冬瓜片翻炒1分钟。`,`加半碗水，盖盖焖8分钟至冬瓜透明。`,`加盐和鸡精调味，淋水淀粉薄芡，撒葱花出锅。`],tips:[`冬瓜焖到透明更入味。`,`水淀粉薄薄一层即可。`]},{id:`suan-rong-kong-xin-cai`,name:`蒜蓉空心菜`,type:`vegetable`,tags:[`蒜香`,`快手`,`清爽`],cookingTime:12,difficulty:`简单`,servings:2,imageType:`vegetable`,ingredients:[L(`空心菜`,350,`g`,`vegetable`),L(`蒜`,5,`瓣`,`vegetable`)],seasonings:[L(`盐`,2,`g`,`seasoning`),L(`食用油`,1.5,`勺`,`seasoning`),L(`鸡精`,1,`g`,`seasoning`)],steps:[`空心菜摘段洗净，菜梗和叶分开放。`,`蒜拍碎剁成蒜蓉。`,`锅烧到很热，下油和一半蒜蓉爆香。`,`先下菜梗翻炒20秒。`,`再下菜叶大火翻炒到变软。`,`加盐、鸡精和剩余蒜蓉，快速炒匀出锅。`],tips:[`锅要热，动作要快。`,`最后加一半生蒜蓉，蒜香更明显。`]},{id:`qing-chao-wo-sun-pian`,name:`清炒莴笋片`,type:`vegetable`,tags:[`清爽`,`快手`,`素菜`],cookingTime:15,difficulty:`简单`,servings:2,imageType:`vegetable`,ingredients:[L(`莴笋`,1,`根`,`vegetable`),L(`胡萝卜`,.5,`根`,`vegetable`),L(`蒜`,2,`瓣`,`vegetable`)],seasonings:[L(`盐`,2,`g`,`seasoning`),L(`鸡精`,1,`g`,`seasoning`),L(`食用油`,1,`勺`,`seasoning`)],steps:[`莴笋去皮切薄片，胡萝卜切片。`,`蒜切片备用。`,`锅中热油，放蒜片炒香。`,`加入胡萝卜片先炒30秒。`,`倒入莴笋片大火翻炒。`,`加盐和少许鸡精，炒到莴笋断生出锅。`],tips:[`莴笋切薄一些更快熟。`,`不要炒到发软，保持脆甜。`]},{id:`gan-guo-hua-cai`,name:`干锅花菜`,type:`vegetable`,tags:[`川菜`,`微辣`,`下饭`],cookingTime:25,difficulty:`中等`,servings:2,imageType:`spicy`,ingredients:[L(`花菜`,450,`g`,`vegetable`),L(`五花肉`,80,`g`,`meat`),L(`青椒`,1,`个`,`vegetable`),L(`蒜`,3,`瓣`,`vegetable`)],seasonings:[L(`豆瓣酱`,1,`勺`,`seasoning`),L(`生抽`,1,`勺`,`seasoning`),L(`蚝油`,1,`勺`,`seasoning`),L(`白糖`,.5,`勺`,`seasoning`),L(`盐`,1,`g`,`seasoning`)],steps:[`花菜掰小朵，用淡盐水浸泡后冲洗干净。`,`五花肉切薄片，青椒切块，蒜切片。`,`花菜焯水1分钟后捞出沥干。`,`锅中下五花肉煸出油脂。`,`加入豆瓣酱和蒜片炒香，放花菜和青椒。`,`加生抽、蚝油、白糖和少许盐，大火炒匀出锅。`],tips:[`花菜焯水后要沥干，干锅口感更好。`,`五花肉只做增香，可少量使用。`]},{id:`hao-you-xing-bao-gu`,name:`蚝油杏鲍菇`,type:`vegetable`,tags:[`家常`,`鲜香`,`素菜`],cookingTime:18,difficulty:`简单`,servings:2,imageType:`vegetable`,ingredients:[L(`杏鲍菇`,3,`根`,`vegetable`),L(`青椒`,1,`个`,`vegetable`),L(`蒜`,3,`瓣`,`vegetable`)],seasonings:[L(`蚝油`,1.5,`勺`,`seasoning`),L(`生抽`,1,`勺`,`seasoning`),L(`白糖`,.5,`勺`,`seasoning`),L(`黑胡椒`,1,`g`,`seasoning`),L(`食用油`,1,`勺`,`seasoning`)],steps:[`杏鲍菇切片或手撕成条，青椒切片。`,`蒜切末备用。`,`干锅先把杏鲍菇煸出水汽，盛出。`,`锅中下油炒香蒜末。`,`倒入杏鲍菇和青椒翻炒。`,`加蚝油、生抽、白糖和黑胡椒，炒匀出锅。`],tips:[`先干煸能让杏鲍菇更香。`,`蚝油偏咸，一般不用额外加盐。`]},{id:`fan-qie-dan-hua-tang`,name:`番茄蛋花汤`,type:`soup`,tags:[`汤品`,`家常`,`清淡`],cookingTime:15,difficulty:`简单`,servings:2,imageType:`soup`,ingredients:[L(`番茄`,1,`个`,`vegetable`),L(`鸡蛋`,2,`个`,`egg`),L(`小葱`,1,`根`,`vegetable`)],seasonings:[L(`盐`,2,`g`,`seasoning`),L(`白胡椒粉`,1,`g`,`seasoning`),L(`香油`,.5,`勺`,`seasoning`)],steps:[`番茄切小块，鸡蛋打散，小葱切花。`,`锅中少油炒番茄，炒出红汤。`,`加入两碗清水煮开。`,`加盐和白胡椒粉调味。`,`转小火淋入蛋液，稍凝固后轻推。`,`出锅前滴香油并撒葱花。`],tips:[`番茄先炒出汁，汤更有味。`,`蛋液细细淋入，蛋花更漂亮。`]},{id:`zi-cai-dan-hua-tang`,name:`紫菜蛋花汤`,type:`soup`,tags:[`汤品`,`快手`,`清淡`],cookingTime:10,difficulty:`简单`,servings:2,imageType:`soup`,ingredients:[L(`紫菜`,8,`g`,`vegetable`),L(`鸡蛋`,1,`个`,`egg`),L(`虾皮`,8,`g`,`other`),L(`小葱`,1,`根`,`vegetable`)],seasonings:[L(`盐`,2,`g`,`seasoning`),L(`白胡椒粉`,1,`g`,`seasoning`),L(`香油`,.5,`勺`,`seasoning`)],steps:[`紫菜撕小块，鸡蛋打散，小葱切花。`,`锅中加两碗水煮开，放入虾皮。`,`加入紫菜煮30秒。`,`加盐和白胡椒粉调味。`,`淋入蛋液形成蛋花。`,`关火后滴香油，撒葱花。`],tips:[`紫菜不用久煮。`,`虾皮有咸味，盐少放。`]},{id:`dong-gua-wan-zi-tang`,name:`冬瓜丸子汤`,type:`soup`,tags:[`汤品`,`清淡`,`暖胃`],cookingTime:30,difficulty:`中等`,servings:2,imageType:`soup`,ingredients:[L(`冬瓜`,350,`g`,`vegetable`),L(`猪肉末`,180,`g`,`meat`),L(`姜`,1,`小块`,`vegetable`),L(`小葱`,1,`根`,`vegetable`)],seasonings:[L(`盐`,3,`g`,`seasoning`),L(`料酒`,1,`勺`,`seasoning`),L(`淀粉`,1,`勺`,`seasoning`),L(`白胡椒粉`,1,`g`,`seasoning`),L(`香油`,.5,`勺`,`seasoning`)],steps:[`肉末加姜末、料酒、盐、白胡椒粉和淀粉搅打上劲。`,`冬瓜去皮切片，小葱切花。`,`锅中加水煮到微开，挤入肉丸。`,`丸子定型后撇去浮沫。`,`加入冬瓜片煮到透明。`,`加盐调味，出锅前滴香油撒葱花。`],tips:[`水微开时下丸子不容易散。`,`肉馅顺一个方向搅更弹。`]},{id:`luo-bo-pai-gu-tang`,name:`萝卜排骨汤`,type:`soup`,tags:[`汤品`,`清淡`,`家常`],cookingTime:60,difficulty:`中等`,servings:2,imageType:`soup`,ingredients:[L(`排骨`,400,`g`,`meat`),L(`白萝卜`,1,`根`,`vegetable`),L(`姜`,1,`小块`,`vegetable`),L(`小葱`,2,`根`,`vegetable`)],seasonings:[L(`料酒`,1,`勺`,`seasoning`),L(`盐`,3,`g`,`seasoning`),L(`白胡椒粉`,1,`g`,`seasoning`)],steps:[`排骨冷水下锅，加料酒焯水后洗净。`,`白萝卜去皮切滚刀块，姜切片。`,`锅中放排骨、姜片和足量热水。`,`小火炖35分钟。`,`加入白萝卜继续炖20分钟。`,`加盐和白胡椒粉调味，撒葱花。`],tips:[`汤类最好一次加足水。`,`萝卜后放，口感更好。`]},{id:`jun-gu-tang`,name:`菌菇汤`,type:`soup`,tags:[`汤品`,`鲜香`,`清淡`],cookingTime:20,difficulty:`简单`,servings:2,imageType:`soup`,in
